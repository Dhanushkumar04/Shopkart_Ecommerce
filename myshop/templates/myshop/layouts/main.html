{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>
      {% block title %}
      {% endblock title %}
    </title>
    
    <!-- Font Awesome 6 for premium modern icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Global Style Sheet with cache buster -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v={% now 'U' %}">
  </head>
  <body>
    {% include 'myshop/inc/navbar.html' %}
    
    {% block content %}
    {% endblock content %}
    
    {% include 'myshop/inc/footer.html' %}
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    
    <!-- Global JS for Interactive 3D Card tilt mechanics -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const cards = document.querySelectorAll('.interactive-card');
        
        cards.forEach(card => {
          card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const width = rect.width;
            const height = rect.height;
            
            // Calculate rotation angles (max 8 degrees tilt, matches react components)
            const rotateX = ((y - height / 2) / (height / 2)) * -8;
            const rotateY = ((x - width / 2) / (width / 2)) * 8;
            
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.04, 1.04, 1.04)`;
            card.style.transition = 'transform 0.08s ease-out';
          });
          
          card.addEventListener('mouseleave', () => {
            card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)';
            card.style.transition = 'transform 0.4s ease-in-out';
          });
        });
      });
    </script>
    
    {% block scripts %}
    {% endblock scripts %}
  </body>
</html>
