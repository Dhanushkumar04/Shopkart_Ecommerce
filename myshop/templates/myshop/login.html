{% extends 'myshop/layouts/main.html' %}
{% block title %}
  Login | ShopKart
{% endblock title %}
{% block content %}
  <!-- Glow Blur Background Deco -->
  <div class="glow-blur" style="top: 30%; left: 35%;"></div>
  
  <div class="container auth-container">
    <div class="auth-card animate__animated animate__fadeInUp">
      <h4><i class="fa-solid fa-lock me-2"></i>User Login</h4>
      <hr class="mb-4">
      
      {% include 'myshop/inc/message.html' %}
      
      <form method="post" action="">
        {% csrf_token %}
        <div class="form-group-custom">
          <label for="username" class="form-label-custom">User Name</label>
          <input type="text" name="username" id="username" class="form-control" placeholder="Enter User Name" required>
        </div>
        
        <div class="form-group-custom">
          <label for="password" class="form-label-custom">Password</label>
          <input type="password" name="password" id="password" class="form-control" placeholder="Enter Password" required>
        </div>
        
        <div class="d-grid gap-2 mt-4">
          <button type="submit" class="btn btn-primary btn-lg">
            <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
          </button>
        </div>
      </form>
      
      <p class="text-center mt-4 mb-0 text-muted">
        Don't have an account? <a href="{% url 'register' %}" class="text-info fw-bold">Register Now</a>
      </p>
    </div>
  </div>
{% endblock content %}
